spring:
  application:
    name: rfc-format
  ai:
    model:
      chat: none
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:qwen3-embedding:8b}
        truncate: true
        keep-alive: 5m
    vectorstore:
      type: qdrant
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_GRPC_PORT:6334}
        collection-name: ${QDRANT_COLLECTION:rfc-data}
        initialize-schema: true

rfc:
  vector:
    # 限制单次 embedding 与 Qdrant add 的文档数，避免全量导入形成超大请求。
    write-batch-size: ${RFC_VECTOR_WRITE_BATCH_SIZE:32}
  chunks:
    # 超长逻辑块按段落/行无损二次切分，避免 embedding 模型静默截断。
    max-embedding-chars: ${RFC_CHUNK_MAX_EMBEDDING_CHARS:12000}
